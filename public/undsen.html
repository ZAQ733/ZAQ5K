<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undsen • MySite</title>

<style>
body { font-family: Arial, sans-serif; background:#eef2f7; display:flex; justify-content:center; padding-top:40px; }
.dashboard { background:#fff; width:560px; padding:30px 40px; border-radius:12px; box-shadow:0 12px 36px rgba(0,0,0,.15); }
h1 { font-size:26px; color:#2563eb; margin-bottom:20px; }

.wallet { margin-top:15px; font-size:18px; display:flex; justify-content:space-between; }
.wallet span.value { font-weight:bold; }

.section { margin-top:30px; }
.section h2 { font-size:18px; margin-bottom:10px; }

.transfer, .loan { display:flex; gap:10px; flex-wrap:wrap; }
input, select {
  flex:1; padding:10px; border-radius:8px;
  border:1px solid #d1d5db; font-size:15px;
}

button {
  padding:10px 15px; border-radius:8px; border:none;
  background:#16a34a; color:white; font-weight:bold;
  cursor:pointer;
}
button:hover { background:#15803d; }

.logout-btn {
  margin-top:25px; width:100%;
  background:#ef4444;
}
.logout-btn:hover { background:#b91c1c; }

.modal {
  position:fixed; inset:0; background:rgba(0,0,0,.5);
  display:none; align-items:center; justify-content:center;
}
.modal-box {
  background:#fff; width:400px; padding:25px;
  border-radius:10px;
}
.modal-box h3 { margin-bottom:10px; }
.modal-box p { font-size:14px; margin-bottom:15px; }
.modal-actions { display:flex; gap:10px; }
.cancel { background:#6b7280; }
.cancel:hover { background:#4b5563; }
</style>
</head>

<body>

<div class="dashboard">
  <h1 id="username">Нэвтэрсэн хэрэглэгч</h1>

  <div class="wallet">
    <span>Таны хэтэвч:</span>
    <span id="wallet" class="value">0 ₮</span>
  </div>

  <!-- TRANSFER -->
  <div class="section">
    <h2>Мөнгө шилжүүлэх</h2>
    <div class="transfer">
      <input id="recipientName" placeholder="Хүлээн авагчийн нэр">
      <input id="transferAmount" type="number" placeholder="Дүн">
      <button onclick="transfer()">Шилжүүлэх</button>
    </div>
  </div>

  <!-- LOAN -->
  <div class="section">
    <h2>Зээл авах / Төлөх</h2>
    <div class="loan">
      <select id="loanAmount">
        <option value="">Зээлийн дүн</option>
        <option value="500">500 ₮</option>
      </select>
      <button onclick="openLoanModal()">Зээл авах</button>
      <button onclick="repayLoan()">Зээл төлөх</button>
    </div>
    <small id="cooldownInfo" style="color:#ef4444;"></small>
  </div>

  <button class="logout-btn" onclick="logout()">Гарах</button>
</div>

<div class="modal" id="loanModal">
  <div class="modal-box">
    <h3>Зээлийн гэрээ</h3>
    <p>Та зээл авснаар 1 цагийн дотор дахин зээл авах боломжгүй.
       туршилтын веб тул заавал төлөх шаардлагүй.</p>
    <div class="modal-actions">
      <button onclick="confirmLoan()">Зөвшөөрөх</button>
      <button class="cancel" onclick="closeLoanModal()">Цуцлах</button>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  let currentUser = JSON.parse(localStorage.getItem("currentUser"));
  if(!currentUser || !currentUser.email){
    alert("Дахин нэвтэрнэ үү");
    location.href="login1.html";
    return;
  }

  const usernameEl = document.getElementById("username");
  const walletEl = document.getElementById("wallet");
  const cooldownInfo = document.getElementById("cooldownInfo");

  const COOLDOWN = 60 * 60 * 1000;

  function formatMoney(n){ return n.toLocaleString("mn-MN")+" ₮"; }

  async function refreshUser(){
    const users = await fetch("/users").then(r=>r.json());
    const user = users[currentUser.email];
    if(!user){
      alert("User олдсонгүй");
      logout();
      return;
    }
    currentUser.wallet = user.wallet;
    currentUser.loan = user.loan;
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
    walletEl.innerText = formatMoney(user.wallet);

    if(user.loan){
      const left = COOLDOWN - (Date.now() - user.loan.takenAt);
      if(left>0){
        cooldownInfo.innerText =
          "Дараагийн зээл авах боломж: " + Math.ceil(left/60000) + " минут";
        return false;
      }
    }
    cooldownInfo.innerText="";
    return true;
  }

  usernameEl.innerText = currentUser.name;
  await refreshUser();

  /* TRANSFER */
  window.transfer = async function(){
    const name = recipientName.value.trim();
    const amount = Number(transferAmount.value);
    if(!name || amount<=0) return alert("Буруу утга");

    const res = await fetch("/transfer",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        fromEmail: currentUser.email,
        toName: name,
        amount
      })
    });

    if(!res.ok) return alert(await res.text());
    await refreshUser();
    recipientName.value="";
    transferAmount.value="";
    alert("Амжилттай шилжлээ!");
  };

  /* LOAN */
  window.openLoanModal = async function(){
    if(!loanAmount.value) return alert("Дүн сонгоно уу");
    const ok = await refreshUser();
    if(ok) loanModal.style.display="flex";
  };

  window.closeLoanModal = () => loanModal.style.display="none";

  window.confirmLoan = async function(){
    const amount = Number(loanAmount.value);

    const res = await fetch("/loan",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        email: currentUser.email,
        amount
      })
    });

    if(!res.ok) return alert(await res.text());

    loanModal.style.display="none";
    loanAmount.value="";
    await refreshUser();
    alert(amount+"₮ зээл амжилттай орлоо!");
  };

  window.repayLoan = async function(){
    if(!currentUser.loan) return alert("Зээл байхгүй байна");

    const res = await fetch("/repay-loan",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        email: currentUser.email
      })
    });

    if(!res.ok) return alert(await res.text());
    await refreshUser();
    alert("Зээл амжилттай төлөгдлөө!");
  };

  window.logout = function(){
    localStorage.removeItem("currentUser");
    location.href="login1.html";
  };

});
</script>

</body>
</html>
