<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up • MySite</title>

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: #eef2f7;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.signup-box {
  background: #fff;
  width: 400px;
  padding: 40px 30px;
  border-radius: 12px;
  box-shadow: 0 12px 36px rgba(0,0,0,0.15);
  text-align: center;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  color: #2563eb;
  margin-bottom: 30px;
}

input {
  width: 100%;
  padding: 14px;
  margin-bottom: 15px;
  border: 1px solid #d1d5db;
  border-radius: 8px;
  font-size: 15px;
}

.signup-btn {
  width: 100%;
  padding: 14px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

.signup-btn:hover {
  background: #15803d;
}

.link {
  margin-top: 20px;
  font-size: 14px;
}

.link a {
  color: #2563eb;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="signup-box">
  <div class="logo">Create Account</div>

  <input type="text" id="name" placeholder="Full Name">
  <input type="email" id="email" placeholder="Email Address">
  <input type="password" id="password" placeholder="Password">

  <button class="signup-btn" onclick="signup()">Sign Up</button>

  <div class="link">
    Already have an account? <a href="login1.html">Log In</a>
  </div>
</div>

<script>
async function signup() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();

  if(!name || !email || !pass){
    alert("Бүх талбарыг бөглөнө үү!");
    return;
  }

  try {
    // Server руу POST request
    const res = await fetch("/addUser", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, pass })
    });

    if(res.ok){
      alert("Амжилттай бүртгэгдлээ!");
      window.location.href = "login1.html";
    } else {
      const err = await res.text();
      alert(err); // Серверээс ирсэн алдаа: "Энэ email аль хэдийн бүртгэлтэй" эсвэл "Энэ нэр аль хэдийн байна"
    }
  } catch(e){
    alert("Сервертэй холбогдож чадсангүй: " + e.message);
  }
}
</script>

</body>
</html>
